spring:
  application:
    name: fintracking-gateway
  cloud:
    gateway:
      server:
        default-filters:
          - name: GlobalFilter
            args:
              baseMessage: Spring Cloud Gateway Global Filter
              preLogger: true
              postLogger: true
        webflux:
          routes:
            - id: fintracking-auth
              uri: lb://FINTRACKING-AUTH
              predicates:
                - Path=/auth-service/**
              filters:
                - StripPrefix=1
                - name: CircuitBreaker
                  args:
                    name: authCB
                    fallbackUri: forward:/fallback/auth
            - id: fintracking-auth-docs
              uri: lb://FINTRACKING-AUTH
              predicates:
                - Path=/v3/api-docs/auth-service
              filters:
                - RewritePath=/v3/api-docs/auth-service, /v3/api-docs

            - id: fintracking-account
              uri: lb://FINTRACKING-ACCOUNT
              predicates:
                - Path=/account-service/**
              filters:
                - StripPrefix=1
                - AuthorizationHeaderFilter
                - name: CircuitBreaker
                  args:
                    name: accountCB
                    fallbackUri: forward:/fallback/account
            - id: fintracking-account-docs
              uri: lb://FINTRACKING-ACCOUNT
              predicates:
                - Path=/v3/api-docs/account-service
              filters:
                - RewritePath=/v3/api-docs/account-service, /v3/api-docs

            - id: fintracking-transaction
              uri: lb://FINTRACKING-TRANSACTION
              predicates:
                - Path=/transaction-service/**
              filters:
                - StripPrefix=1
                - AuthorizationHeaderFilter
                - name: CircuitBreaker
                  args:
                    name: transactionCB
                    fallbackUri: forward:/fallback/transaction
            - id: fintracking-transaction-docs
              uri: lb://FINTRACKING-TRANSACTION
              predicates:
                - Path=/v3/api-docs/transaction-service
              filters:
                - RewritePath=/v3/api-docs/transaction-service, /v3/api-docs

            - id: fintracking-budget
              uri: lb://FINTRACKING-BUDGET
              predicates:
                - Path=/budget-service/**
              filters:
                - StripPrefix=1
                - AuthorizationHeaderFilter
                - name: CircuitBreaker
                  args:
                    name: budgetCB
                    fallbackUri: forward:/fallback/budget
            - id: fintracking-budget-docs
              uri: lb://FINTRACKING-BUDGET
              predicates:
                - Path=/v3/api-docs/budget-service
              filters:
                - RewritePath=/v3/api-docs/budget-service, /v3/api-docs

            - id: fintracking-notification
              uri: lb://FINTRACKING-NOTIFICATION
              predicates:
                - Path=/notification-service/**
              filters:
                - StripPrefix=1
                - AuthorizationHeaderFilter
                - name: CircuitBreaker
                  args:
                    name: notificationCB
                    fallbackUri: forward:/fallback/notification
            - id: fintracking-notification-docs
              uri: lb://FINTRACKING-NOTIFICATION
              predicates:
                - Path=/v3/api-docs/notification-service
              filters:
                - RewritePath=/v3/api-docs/notification-service, /v3/api-docs

server:
  port: 8000

springdoc:
  swagger-ui:
    urls:
      - name: auth-service
        url: /v3/api-docs/auth-service
      - name: account-service
        url: /v3/api-docs/account-service
      - name: transaction-service
        url: /v3/api-docs/transaction-service
      - name: budget-service
        url: /v3/api-docs/budget-service
      - name: notification-service
        url: /v3/api-docs/notification-service
    use-root-path: true

jwt:
  access-expiration: 3600000    # 1시간 (ms)
  refresh-expiration: 604800000 # 7일 (ms)

# ──────────────────────────────────────────────────────────────
# Resilience4J — Circuit Breaker + TimeLimiter 명시적 설정
# TimeLimiter: 각 서비스 응답 대기 타임아웃
# CircuitBreaker: 장애 감지 및 차단 정책
# ──────────────────────────────────────────────────────────────
resilience4j:
  timelimiter:
    instances:
      authCB:
        timeoutDuration: 3s       # 인증 서비스 (JWT 발급/검증, 빠른 응답 기대)
      accountCB:
        timeoutDuration: 4s       # 계좌 서비스 (DB 조회)
      transactionCB:
        timeoutDuration: 5s       # 거래 서비스 (DB + Kafka 발행)
      budgetCB:
        timeoutDuration: 4s       # 예산 서비스 (DB 조회)
      notificationCB:
        timeoutDuration: 4s       # 알림 서비스 (비동기 발송)

  circuitbreaker:
    instances:
      authCB:
        slidingWindowSize: 10               # 최근 10회 호출 기준으로 상태 평가
        failureRateThreshold: 50            # 실패율 50% 초과 시 OPEN
        waitDurationInOpenState: 10s        # OPEN 후 10초 대기 후 HALF_OPEN 전환
        permittedNumberOfCallsInHalfOpenState: 3  # HALF_OPEN 상태에서 허용할 테스트 호출 수
        slowCallDurationThreshold: 3s       # 3초 초과 응답을 slowCall로 분류
        slowCallRateThreshold: 80           # slowCall 비율 80% 초과 시 OPEN
      accountCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 4s
        slowCallRateThreshold: 80
      transactionCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 5s
        slowCallRateThreshold: 80
      budgetCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 4s
        slowCallRateThreshold: 80
      notificationCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 4s
        slowCallRateThreshold: 80
